<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sax Practice Journal</title>
<meta name="theme-color" content="#1a6b3c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sax">
<style>
:root {
  --font-display: Georgia, 'Times New Roman', serif;
  --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  --green:       #1a6b3c;
  --light-green: #2a9d5c;
  --black:       #0a0a0a;
  --charcoal:    #1a1a1a;
  --gold:        #D4A017;
  --light-gold:  #F0C040;
  --paper:       #f5f0e8;
  --muted:       #777;
}
html { background:#0a0a0a; }
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: var(--font-body);
  background: var(--black);
  color: var(--paper);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content:''; position:fixed; inset:0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(26,107,60,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(212,160,23,0.04) 0%, transparent 50%);
  pointer-events:none; z-index:0;
}

.app { position:relative; z-index:1; max-width:720px; margin:0 auto; padding:20px 16px 80px; }

/* HEADER */
header { text-align:center; padding:28px 0 18px; }
header::after {
  content:''; display:block; height:2px; margin-top:16px;
  background:linear-gradient(90deg,transparent,var(--green),var(--gold),var(--green),transparent);
}
.header-badge {
  font-size:52px; margin-bottom:8px;
  filter:drop-shadow(0 0 20px rgba(26,107,60,0.7));
  animation:pulse 3s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { filter:drop-shadow(0 0 18px rgba(26,107,60,0.5)); }
  50%      { filter:drop-shadow(0 0 32px rgba(212,160,23,0.8)); }
}
h1 {
  font-family: var(--font-display);
  font-size: clamp(22px,5vw,34px); font-weight:900; letter-spacing:2px;
  background: linear-gradient(135deg, var(--paper) 0%, var(--light-gold) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.subtitle { font-size:11px; color:var(--muted); letter-spacing:3px; text-transform:uppercase; margin-top:5px; }

/* DATE STRIP */
.date-strip {
  background:var(--charcoal); border:1px solid rgba(212,160,23,0.2);
  border-radius:12px; padding:12px 18px;
  display:flex; justify-content:space-between; align-items:center;
  margin:14px 0; flex-wrap:wrap; gap:8px;
}
.date-text { font-family:var(--font-display); font-size:13px; color:var(--light-gold); }
.streak-badge {
  background:linear-gradient(135deg,var(--green),var(--light-green));
  border-radius:20px; padding:5px 14px; font-size:12px; font-weight:700; color:#fff;
}

/* TABS */
.tabs { display:flex; gap:4px; background:var(--charcoal); border-radius:12px; padding:4px; margin:14px 0; }
.tab {
  flex:1; padding:10px 6px; text-align:center; border-radius:9px;
  font-size:13px; font-weight:700; cursor:pointer; border:none;
  background:transparent; color:var(--muted); transition:all 0.2s;
  font-family:var(--font-body); touch-action:manipulation;
}
.tab.active { background:linear-gradient(135deg,var(--green),var(--light-green)); color:#fff; }
.tab-content { display:none; }
.tab-content.active { display:block; }

/* TIME SELECTOR */
.time-selector {
  background:var(--charcoal); border:1px solid rgba(255,255,255,0.08);
  border-radius:14px; padding:16px 18px; margin-bottom:14px;
}
.section-label {
  font-size:10px; letter-spacing:4px; text-transform:uppercase;
  color:var(--light-green); margin-bottom:12px;
  display:flex; align-items:center; gap:10px;
}
.section-label::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,rgba(26,107,60,0.4),transparent); }

.time-presets { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
.time-preset {
  padding:8px 16px; border-radius:20px; font-size:13px; font-weight:700;
  cursor:pointer; border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.06); color:var(--muted);
  font-family:var(--font-body); touch-action:manipulation; transition:all 0.18s;
}
.time-preset.active { background:linear-gradient(135deg,var(--green),var(--light-green)); border-color:transparent; color:#fff; }

.time-slider-row { display:flex; align-items:center; gap:12px; }
.time-slider {
  flex:1; -webkit-appearance:none; appearance:none;
  height:6px; border-radius:99px; background:rgba(255,255,255,0.1); outline:none; cursor:pointer;
}
.time-slider::-webkit-slider-thumb {
  -webkit-appearance:none; width:22px; height:22px;
  border-radius:50%; background:var(--light-green);
  box-shadow:0 0 8px rgba(26,107,60,0.6); cursor:pointer;
}
.time-value { font-family:var(--font-display); font-size:18px; font-weight:700; color:var(--light-gold); min-width:70px; }

/* GENERATE BUTTON */
.btn-generate {
  width:100%; padding:14px; border-radius:12px; border:none;
  background:linear-gradient(135deg,var(--green),var(--light-green));
  color:#fff; font-family:var(--font-body); font-size:15px; font-weight:700;
  cursor:pointer; margin-bottom:16px; box-shadow:0 4px 20px rgba(26,107,60,0.35);
  touch-action:manipulation; transition:all 0.2s;
}
.btn-generate:active { opacity:0.85; transform:scale(0.98); }

/* SESSION BLOCK */
.session-block {
  background:var(--charcoal); border:1px solid rgba(255,255,255,0.06);
  border-radius:14px; margin-bottom:10px; overflow:hidden; transition:border-color 0.22s;
}
.session-block.done     { border-color:rgba(26,107,60,0.5); }
.session-block.active-timer { border-color:rgba(212,160,23,0.4); }

.session-block-header {
  display:flex; align-items:center; gap:12px; padding:14px 16px;
  cursor:pointer; position:relative; touch-action:manipulation;
  -webkit-user-select:none; user-select:none;
}
.session-block-header::before {
  content:''; position:absolute; top:0; left:0; width:3px; height:100%;
  background:var(--light-green); opacity:0; transition:opacity 0.22s;
  border-radius:14px 0 0 14px;
}
.session-block.done .session-block-header::before { opacity:1; }

.block-check {
  width:24px; height:24px; border-radius:50%; flex-shrink:0;
  border:2px solid rgba(255,255,255,0.15);
  display:flex; align-items:center; justify-content:center;
  font-size:13px; transition:all 0.22s;
}
.session-block.done .block-check { background:var(--light-green); border-color:var(--light-green); color:#fff; }

.block-icon { font-size:22px; flex-shrink:0; }
.block-info { flex:1; }
.block-name { font-size:15px; font-weight:700; color:var(--paper); }
.block-meta { font-size:12px; color:var(--muted); margin-top:2px; }
.block-duration { font-family:var(--font-display); font-size:13px; font-weight:700; color:var(--light-gold); flex-shrink:0; }

/* BLOCK TIMER */
.block-timer { display:none; padding:6px 16px 10px; border-top:1px solid rgba(255,255,255,0.05); }
.block-timer.running { display:block; }
.block-timer-bar-bg { background:rgba(255,255,255,0.07); border-radius:99px; height:4px; overflow:hidden; margin-bottom:5px; }
.block-timer-bar { height:100%; border-radius:99px; width:100%; background:linear-gradient(90deg,var(--green),var(--gold)); transition:width 1s linear; }
.block-timer-label { font-size:12px; color:var(--light-gold); font-family:var(--font-display); letter-spacing:1px; }

/* BLOCK BODY — scale card */
.block-body { padding:0 16px 14px 16px; }

.scale-card {
  background: linear-gradient(135deg, rgba(26,107,60,0.25), rgba(20,20,20,0.8));
  border: 1px solid rgba(26,107,60,0.35);
  border-radius:12px; padding:18px 20px; margin-top:10px;
  text-align:center;
}
.scale-root {
  font-family:var(--font-display); font-size:42px; font-weight:900;
  color:var(--light-gold); line-height:1; letter-spacing:2px;
}
.scale-type {
  font-size:15px; font-weight:700; color:var(--paper);
  margin-top:6px; letter-spacing:1px;
}
.scale-notes {
  font-size:12px; color:rgba(245,240,232,0.5);
  margin-top:8px; letter-spacing:2px; font-family:var(--font-display);
}
.scale-tip {
  font-size:11px; color:var(--muted); margin-top:10px;
  padding-top:10px; border-top:1px solid rgba(255,255,255,0.06);
}

.reroll-btn {
  margin-top:12px; padding:8px 20px; border-radius:20px; border:none;
  background:rgba(255,255,255,0.07); color:var(--paper);
  font-family:var(--font-body); font-size:13px; font-weight:700;
  cursor:pointer; touch-action:manipulation; transition:all 0.2s;
}
.reroll-btn:active { opacity:0.7; }

/* PROGRESS */
.progress-wrap {
  background:var(--charcoal); border-radius:12px; padding:14px 18px;
  margin-bottom:12px; border:1px solid rgba(255,255,255,0.06);
}
.progress-label { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:8px; }
.progress-bar-bg { background:rgba(255,255,255,0.07); border-radius:99px; height:7px; overflow:hidden; }
.progress-bar-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,var(--green),var(--light-green),var(--gold)); transition:width 0.6s ease; }

/* SAVE BTN */
.btn-save {
  width:100%; padding:14px; border-radius:12px; border:none;
  background:linear-gradient(135deg,var(--green),var(--light-green));
  color:#fff; font-family:var(--font-body); font-size:15px; font-weight:700;
  cursor:pointer; margin-top:14px; touch-action:manipulation; display:none;
}
.btn-save:active { opacity:0.85; }

/* TIMER TAB */
.timer-wrap { background:var(--charcoal); border-radius:16px; padding:24px; border:1px solid rgba(255,255,255,0.06); text-align:center; }
.timer-display { font-family:var(--font-display); font-size:64px; font-weight:900; letter-spacing:-2px; color:var(--paper); line-height:1; margin:10px 0; }
.timer-display.active { color:var(--light-gold); }
.timer-status { font-size:11px; color:var(--muted); letter-spacing:3px; text-transform:uppercase; }
.timer-btns  { display:flex; gap:8px; justify-content:center; margin-top:16px; flex-wrap:wrap; }
.timer-presets { display:flex; gap:8px; justify-content:center; margin-top:12px; flex-wrap:wrap; }

.btn { padding:11px 22px; border-radius:10px; border:none; font-family:var(--font-body); font-size:13px; font-weight:700; cursor:pointer; touch-action:manipulation; transition:all 0.2s; }
.btn-green { background:linear-gradient(135deg,var(--green),var(--light-green)); color:#fff; }
.btn-ghost { background:rgba(255,255,255,0.07); color:var(--paper); border:1px solid rgba(255,255,255,0.1); }
.btn-ghost:active, .btn-green:active { opacity:0.8; }
.btn-small { padding:7px 14px; font-size:12px; }

/* HISTORY */
.history-item {
  background:var(--charcoal); border-radius:10px; padding:12px 16px; margin-bottom:8px;
  border:1px solid rgba(255,255,255,0.05); display:flex; justify-content:space-between; align-items:center;
}
.history-main { font-weight:700; font-size:13px; }
.history-sub  { color:var(--muted); font-size:11px; margin-top:2px; }
.history-score { background:rgba(26,107,60,0.2); color:var(--light-green); border-radius:20px; padding:3px 12px; font-size:12px; font-weight:700; white-space:nowrap; }

/* METRONOME */
.metro-bpm {
  font-family: var(--font-display); font-size: 80px; font-weight:900;
  color: var(--light-gold); line-height:1; letter-spacing:-2px; margin-bottom:4px;
}
.metro-bpm-label { font-size:11px; color:var(--muted); letter-spacing:4px; text-transform:uppercase; margin-bottom:16px; }
.metro-slider-row { display:flex; align-items:center; gap:10px; margin-bottom:4px; }

/* TOAST */
.toast {
  position:fixed; bottom:28px; left:50%;
  transform:translateX(-50%) translateY(90px);
  background:var(--green); color:#fff;
  padding:11px 26px; border-radius:30px; font-weight:700; font-size:13px;
  transition:transform 0.3s ease; z-index:100; white-space:nowrap;
}
.toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="header-badge">🎷</div>
    <h1>Sax Practice Journal</h1>
    <div class="subtitle">Adaptive Session Planner</div>
  </header>

  <div class="date-strip">
    <div class="date-text" id="dateDisplay"></div>
    <div class="streak-badge">🔥 <span id="streakCount">0</span> day streak</div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="today">Today</button>
    <button class="tab" data-tab="timer">Metronome</button>
    <button class="tab" data-tab="history">History</button>
  </div>

  <!-- TODAY -->
  <div id="tab-today" class="tab-content active">
    <div class="time-selector">
      <div class="section-label">How much time do you have?</div>
      <div class="time-presets" id="timePresets"></div>
      <div class="time-slider-row">
        <input type="range" class="time-slider" id="timeSlider" min="15" max="90" step="5" value="30">
        <div class="time-value" id="timeValue">30 min</div>
      </div>
    </div>
    <button class="btn-generate" id="generateBtn">🎲 Generate Today's Session</button>
    <div id="sessionBlocks"></div>
    <button class="btn-save" id="saveBtn">💾 Save Session</button>
  </div>

  <!-- METRONOME -->
  <div id="tab-timer" class="tab-content">
    <div class="section-label" style="margin:16px 0 12px;">Metronome</div>
    <div class="timer-wrap">

      <div class="metro-bpm" id="metroBpm">80</div>
      <div class="metro-bpm-label">BPM</div>

      <div class="metro-slider-row">
        <button class="btn btn-ghost btn-small" id="bpmDown">－</button>
        <input type="range" class="time-slider" id="bpmSlider" min="40" max="200" step="1" value="80">
        <button class="btn btn-ghost btn-small" id="bpmUp">＋</button>
      </div>

      <div class="timer-btns" style="margin-top:20px;">
        <button class="btn btn-green" id="metroStart">▶ Start</button>
        <button class="btn btn-ghost" id="metroStop">■ Stop</button>
        <button class="btn btn-ghost" id="metroTap">👆 Tap</button>
      </div>

    </div>
  </div>

  <!-- HISTORY -->
  <div id="tab-history" class="tab-content">
    <div class="section-label" style="margin:16px 0 12px;">Practice History</div>
    <div id="historyList">
      <div style="text-align:center;color:var(--muted);padding:40px 0;font-size:14px;">
        No sessions saved yet<br>
        <span style="font-size:34px;display:block;margin-top:12px;">🎷</span>
      </div>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
// ── MUSIC DATA ────────────────────────────────────────
const ROOTS = ['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B'];

// Each scale: { name, notes(fn) }
// notes(root) returns the note names as a string
const SCALE_FORMULAS = {
  'Major':            [0,2,4,5,7,9,11],
  'Natural Minor':    [0,2,3,5,7,8,10],
  'Melodic Minor':    [0,2,3,5,7,9,11],
  'Harmonic Minor':   [0,2,3,5,7,8,11],
  'Minor Pentatonic': [0,3,5,7,10],
  'Major Pentatonic': [0,2,4,7,9],
};


function buildScale(root, scaleName) {
  const rootIdx = ROOTS.indexOf(root);
  const formula = SCALE_FORMULAS[scaleName];
  // enharmonic display map
  const display = ['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B'];
  return formula.map(interval => display[(rootIdx + interval) % 12]).join('  ·  ');
}

const SCALE_PATTERNS = [
  { id:1, label:'123 · 321',   notation:'1–2–3 · 3–2–1' },
  { id:2, label:'321 · 123',   notation:'3–2–1 · 1–2–3' },
  { id:3, label:'1234 · 4321', notation:'1–2–3–4 · 4–3–2–1' },
  { id:4, label:'4321 · 1234', notation:'4–3–2–1 · 1–2–3–4' },
  { id:5, label:'1231 · 3213', notation:'1–2–3–1 · 3–2–1–3' },
  { id:6, label:'3213 · 1231', notation:'3–2–1–3 · 1–2–3–1' },
  { id:7, label:'Clarke No.2', notation:'Clarke Technical Study No. 2' },
];

const TONAL_INTERVALS = ['3rd', '4th', '5th', '6th'];
const TONAL_DIRECTIONS = [
  { label: 'Up – Down',   sym: '↑↓' },
  { label: 'Up – Up',     sym: '↑↑' },
  { label: 'Down – Up',   sym: '↓↑' },
  { label: 'Down – Down', sym: '↓↓' },
];
const CHROMATIC_INTERVALS = [
  { label: 'Minor 2nd',   short: 'm2' },
  { label: 'Major 2nd',   short: 'M2' },
  { label: 'Minor 3rd',   short: 'm3' },
  { label: 'Major 3rd',   short: 'M3' },
  { label: 'Perfect 4th', short: 'P4' },
  { label: 'Tritone',     short: 'TT' },
  { label: 'Perfect 5th', short: 'P5' },
  { label: 'Minor 6th',   short: 'm6' },
  { label: 'Major 6th',   short: 'M6' },
];

// Tonal chords: diatonic, pick a degree AND a drill pattern
const TONAL_CHORD_DEGREES = ['I', 'II', 'III', 'IV', 'V', 'VI', 'VII'];
const TONAL_CHORD_DRILLS = [
  { label: '135 · 246',   notation: '1–3–5 · 2–4–6' },
  { label: '531 · 642',   notation: '5–3–1 · 6–4–2' },
  { label: '135 · 642',   notation: '1–3–5 · 6–4–2' },
  { label: '531 · 246',   notation: '5–3–1 · 2–4–6' },
  { label: '1531 · 2642', notation: '1–5–3–1 · 2–6–4–2' },
  { label: '5135 · 6246', notation: '5–1–3–5 · 6–2–4–6' },
  { label: '1353 · 2464', notation: '1–3–5–3 · 2–4–6–4' },
  { label: '1357 · 2468', notation: '1–3–5–7 · 2–4–6–8' },
  { label: '1357 · 8642', notation: '1–3–5–7 · 8–6–4–2' },
  { label: '1st Inversion',  notation: '3–5–1' },
  { label: '2nd Inversion',  notation: '5–1–3' },
];

// Chromatic chords: any root, fixed quality
const CHROMATIC_CHORD_TYPES = [
  { label: 'Major 7',       short: 'Maj7' },
  { label: 'Minor 7',       short: 'min7' },
  { label: 'Dominant 7',    short: 'Dom7' },
  { label: 'Half-Diminished', short: 'ø7' },
  { label: 'Diminished 7',  short: 'dim7' },
];



const WARMUP_OPTIONS = [
  { label: 'Long 5ths & 8ths' },
  { label: 'Overtones' },
];

// Base ratios for each block (used to distribute session time)
const BLOCK_RATIOS = {
  warmup:    0.10,  // ~10%
  scales:    0.15,  // ~15%
  patterns:  0.20,  // ~20%
  intervals: 0.25,  // ~25%
  chords:    0.30,  // ~30%
};

function buildPlan(mins) {
  const warmupChoice = WARMUP_OPTIONS[Math.floor(Math.random() * WARMUP_OPTIONS.length)];

  // Decide which blocks to include based on session length
  const ids = ['warmup', 'scales'];
  if (mins >= 20) ids.push('patterns');
  if (mins >= 30) ids.push('intervals');
  if (mins >= 45) ids.push('chords');

  // Sum of ratios for included blocks
  const totalRatio = ids.reduce((s, id) => s + BLOCK_RATIOS[id], 0);

  // Allocate minutes proportionally, round to whole minutes, min 1
  let allocated = ids.map(id => ({
    id,
    mins: Math.max(1, Math.round(mins * BLOCK_RATIOS[id] / totalRatio))
  }));

  // Fix rounding drift — add/remove from largest block
  let diff = mins - allocated.reduce((s, b) => s + b.mins, 0);
  if (diff !== 0) {
    const largest = allocated.reduce((a, b) => b.mins > a.mins ? b : a);
    largest.mins += diff;
  }

  const icons = { warmup:'🌬️', scales:'🎼', patterns:'🔁', intervals:'🎵', chords:'🎹' };
  const types = { warmup:'simple', scales:'scales', patterns:'patterns', intervals:'intervals', chords:'chords' };

  return allocated.map(b => ({
    id:   b.id,
    icon: icons[b.id],
    name: b.id === 'warmup' ? 'Warm-Up — ' + warmupChoice.label : b.id.charAt(0).toUpperCase() + b.id.slice(1).replace('patterns','Scale Patterns').replace('intervals','Intervals').replace('chords','Chords').replace('scales','Scales'),
    mins: b.mins,
    type: types[b.id],
  }));
}

// ── STATE ─────────────────────────────────────────────
let sessionMins    = 30;
let currentSession = null;
let doneTasks      = {};
let blockTimers    = {};
let history        = [];
let audioCtx       = null;

const TIME_PRESETS = [15, 20, 30, 45, 60, 90];

// ── AUDIO ─────────────────────────────────────────────
function fmt(s) {
  return String(Math.floor(s / 60)).padStart(2,'0') + ':' + String(s % 60).padStart(2,'0');
}

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playGong() {
  try {
    const ctx = getAudio();
    const t = ctx.currentTime;
    [[110,85,0.55],[220,170,0.25],[440,440,0.1]].forEach(([f1,f2,vol]) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(f1, t);
      if (f1 !== f2) osc.frequency.exponentialRampToValueAtTime(f2, t + 3);
      gain.gain.setValueAtTime(vol, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 3);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t); osc.stop(t + 3.5);
    });
  } catch(e) {}
}

// ── INIT ──────────────────────────────────────────────
function init() {
  document.getElementById('dateDisplay').textContent =
    new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  try {
    const s = JSON.parse(localStorage.getItem('sax_v1') || '{}');
    history = s.history || [];
    if (s.streak)      document.getElementById('streakCount').textContent = s.streak;
    if (s.sessionMins) sessionMins = s.sessionMins;
  } catch(e) {}

  buildTimePresets();
  document.getElementById('timeSlider').value = sessionMins;
  document.getElementById('timeValue').textContent = sessionMins + ' min';
  renderHistory();
  bindEvents();
  bindMetronomeEvents();
}

// ── EVENTS ────────────────────────────────────────────
function bindEvents() {
  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
  });

  document.getElementById('timeSlider').addEventListener('input', function() {
    sessionMins = parseInt(this.value);
    document.getElementById('timeValue').textContent = sessionMins + ' min';
    highlightPreset();
    clearSession();
  });

  document.getElementById('generateBtn').addEventListener('click', () => {
    getAudio();
    generateSession();
  });

  document.getElementById('saveBtn').addEventListener('click', saveDay);
}

// ── TIME PRESETS ──────────────────────────────────────
function buildTimePresets() {
  const wrap = document.getElementById('timePresets');
  wrap.innerHTML = '';
  TIME_PRESETS.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'time-preset' + (t === sessionMins ? ' active' : '');
    btn.textContent = t < 60 ? t + ' min' : t === 60 ? '1 hr' : '1.5 hr';
    btn.dataset.mins = t;
    btn.addEventListener('click', () => {
      sessionMins = t;
      document.getElementById('timeSlider').value = t;
      document.getElementById('timeValue').textContent = t + ' min';
      highlightPreset();
      clearSession();
    });
    wrap.appendChild(btn);
  });
}

function highlightPreset() {
  document.querySelectorAll('.time-preset').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.mins) === sessionMins);
  });
}

// ── SESSION ───────────────────────────────────────────
function clearSession() {
  Object.values(blockTimers).forEach(clearInterval);
  blockTimers = {};
  currentSession = null;
  doneTasks = {};
  document.getElementById('sessionBlocks').innerHTML = '';
  document.getElementById('saveBtn').style.display = 'none';
  document.getElementById('generateBtn').textContent = '🎲 Generate Today\'s Session';
}



function generateSession() {
  clearSession();
  currentSession = buildPlan(sessionMins);
  doneTasks = {};

  const container = document.getElementById('sessionBlocks');

  // Progress bar
  const prog = document.createElement('div');
  prog.className = 'progress-wrap';
  prog.innerHTML = `
    <div class="progress-label"><span>Session Progress</span><span id="progressText">0 / ${currentSession.length}</span></div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
  `;
  container.appendChild(prog);

  currentSession.forEach(block => {
    const el = document.createElement('div');
    el.className = 'session-block';
    el.id = 'block-' + block.id;

    let bodyHTML = '';

    if (block.type === 'simple') {
      bodyHTML = block.desc
        ? `<div class="block-body"><div style="font-size:13px;color:rgba(245,240,232,0.6);line-height:1.65;">${block.desc}</div></div>`
        : '';

    } else if (block.type === 'scales') {
      const scale = pickScale();
      block._scale = scale;
      bodyHTML = buildScaleCardHTML(block.id, scale);

    } else if (block.type === 'patterns') {
      const pattern = SCALE_PATTERNS[Math.floor(Math.random() * SCALE_PATTERNS.length)];
      block._pattern = pattern;
      const scalesBlock = currentSession.find(b => b.type === 'scales');
      const key = scalesBlock && scalesBlock._scale ? scalesBlock._scale.root + ' ' + scalesBlock._scale.type : '';
      block._key = key;
      bodyHTML = buildPatternCardHTML(block.id, pattern, key);

    } else if (block.type === 'intervals') {
      const tonal    = pickTonalInterval();
      const chromatic = CHROMATIC_INTERVALS[Math.floor(Math.random() * CHROMATIC_INTERVALS.length)];
      const scalesBlock = currentSession.find(b => b.type === 'scales');
      const key = scalesBlock && scalesBlock._scale ? scalesBlock._scale.root + ' ' + scalesBlock._scale.type : '';
      block._tonal    = tonal;
      block._chromatic = chromatic;
      block._key      = key;
      bodyHTML = buildIntervalsCardHTML(block.id, tonal, chromatic, key);

    } else if (block.type === 'chords') {
      const scalesBlock = currentSession.find(b => b.type === 'scales');
      const key = scalesBlock && scalesBlock._scale ? scalesBlock._scale.root + ' ' + scalesBlock._scale.type : '';
      const drill    = TONAL_CHORD_DRILLS[Math.floor(Math.random() * TONAL_CHORD_DRILLS.length)];
      const chromatic = CHROMATIC_CHORD_TYPES[Math.floor(Math.random() * CHROMATIC_CHORD_TYPES.length)];
      block._key = key; block._drill = drill; block._chromatic = chromatic;
      bodyHTML = buildChordsCardHTML(block.id, key, drill, chromatic);
    }

    el.innerHTML = `
      <div class="session-block-header" data-id="${block.id}">
        <div class="block-check"></div>
        <div class="block-icon">${block.icon}</div>
        <div class="block-info">
          <div class="block-name">${block.name}</div>
          <div class="block-meta">${block.mins} minutes</div>
        </div>
        <div class="block-duration">${block.mins} min</div>
      </div>
      <div class="block-timer" id="timer-${block.id}">
        <div class="block-timer-bar-bg"><div class="block-timer-bar" id="timerbar-${block.id}"></div></div>
        <div class="block-timer-label" id="timerlabel-${block.id}">⏱ ${block.mins}:00</div>
      </div>
      ${bodyHTML}
    `;

    el.querySelector('.session-block-header').addEventListener('click', () => toggleBlock(block.id));

    setTimeout(() => {
      el.querySelectorAll('.reroll-btn').forEach(rb => {
        rb.addEventListener('click', (e) => {
          e.stopPropagation();
          const which = rb.dataset.which;

          if (block.type === 'scales') {
            const ns = pickScale();
            block._scale = ns;
            el.querySelector('.scale-root').textContent = ns.root;
            el.querySelector('.scale-type').textContent = ns.type;
            const newKey = ns.root + ' ' + ns.type;
            ['patterns','intervals','chords'].forEach(bid => {
              const pb = currentSession.find(b => b.id === bid);
              if (pb) { pb._key = newKey; }
              const keyEl = document.querySelector('.key-ref-' + bid);
              if (keyEl) keyEl.textContent = newKey;
            });

          } else if (block.type === 'patterns') {
            const np = SCALE_PATTERNS[Math.floor(Math.random() * SCALE_PATTERNS.length)];
            block._pattern = np;
            el.querySelector('.pattern-label').textContent    = np.label;
            el.querySelector('.pattern-notation').textContent = np.notation;

          } else if (block.type === 'intervals') {
            if (which === 'tonal') {
              const nt = pickTonalInterval();
              block._tonal = nt;
              el.querySelector('.int-tonal-val').textContent = nt.interval;
              el.querySelector('.int-tonal-dir').textContent = nt.direction.sym + '  ' + nt.direction.label;
            } else {
              const nc = CHROMATIC_INTERVALS[Math.floor(Math.random() * CHROMATIC_INTERVALS.length)];
              block._chromatic = nc;
              el.querySelector('.int-chrom-val').textContent   = nc.short;
              el.querySelector('.int-chrom-label').textContent = nc.label;
            }

          } else if (block.type === 'chords') {
            if (which === 'tonal') {
              const ndr = TONAL_CHORD_DRILLS[Math.floor(Math.random() * TONAL_CHORD_DRILLS.length)];
              block._drill = ndr;
              el.querySelector('.chord-tonal-drill').textContent    = ndr.label;
              el.querySelector('.chord-tonal-notation').textContent = ndr.notation;
            } else {
              const nc = CHROMATIC_CHORD_TYPES[Math.floor(Math.random() * CHROMATIC_CHORD_TYPES.length)];
              block._chromatic = nc;
              el.querySelector('.chord-chrom-type').textContent  = nc.short;
              el.querySelector('.chord-chrom-label').textContent = nc.label;
            }
          }
        });
      });
    }, 50);

    container.appendChild(el);
  });

  document.getElementById('saveBtn').style.display = 'block';
  document.getElementById('generateBtn').textContent = '🔄 Re-generate Session';

  // start first block timer
  const first = currentSession[0];
  setTimeout(() => startBlockTimer(first.id, first.mins), 200);
}

function pickScale() {
  const root  = ROOTS[Math.floor(Math.random() * ROOTS.length)];
  const types = Object.keys(SCALE_FORMULAS);
  const type  = types[Math.floor(Math.random() * types.length)];
  return { root, type, notes: buildScale(root, type) };
}

function pickTonalInterval() {
  const interval  = TONAL_INTERVALS[Math.floor(Math.random() * TONAL_INTERVALS.length)];
  const direction = TONAL_DIRECTIONS[Math.floor(Math.random() * TONAL_DIRECTIONS.length)];
  return { interval, direction };
}

function buildScaleCardHTML(blockId, scale) {
  return `
    <div class="block-body">
      <div class="scale-card">
        <div class="scale-root">${scale.root}</div>
        <div class="scale-type">${scale.type}</div>
      </div>
      <button class="reroll-btn" data-which="scale">🎲 Different scale</button>
    </div>`;
}

function buildPatternCardHTML(blockId, pattern, key) {
  return `
    <div class="block-body">
      <div class="scale-card">
        <div style="font-size:11px;color:var(--muted);margin-bottom:6px;">Key: <span class="key-ref-${blockId}">${key}</span></div>
        <div class="pattern-label" style="font-family:var(--font-display);font-size:32px;font-weight:900;color:var(--light-gold);line-height:1.2;">${pattern.label}</div>
        <div class="pattern-notation" style="font-size:13px;color:rgba(245,240,232,0.55);margin-top:8px;letter-spacing:1px;">${pattern.notation}</div>
      </div>
      <button class="reroll-btn" data-which="pattern">🎲 Different pattern</button>
    </div>`;
}

function miniCardHTML(label, _unused, contentHTML, which) {
  return `
    <div class="scale-card" style="margin-bottom:8px;">
      <div style="font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--light-green);margin-bottom:8px;">${label}</div>
      ${contentHTML}
    </div>
    <button class="reroll-btn" data-which="${which}" style="margin-bottom:8px;">🎲 Reroll</button>`;
}

function buildIntervalsCardHTML(blockId, tonal, chromatic, key) {
  const keySpan = `<span class="key-ref-${blockId}">${key}</span>`;
  const tonalHTML = `
    <div class="int-tonal-val" style="font-family:var(--font-display);font-size:40px;font-weight:900;color:var(--light-gold);line-height:1;">${tonal.interval}</div>
    <div class="int-tonal-dir" style="font-size:15px;color:var(--paper);margin-top:6px;letter-spacing:1px;">${tonal.direction.sym}&nbsp;&nbsp;${tonal.direction.label}</div>`;
  const chromHTML = `
    <div class="int-chrom-val" style="font-family:var(--font-display);font-size:40px;font-weight:900;color:var(--light-gold);line-height:1;">${chromatic.short}</div>
    <div class="int-chrom-label" style="font-size:15px;color:var(--paper);margin-top:6px;">${chromatic.label}</div>`;
  return `<div class="block-body">
    ${miniCardHTML('Tonal · ' + keySpan, '', tonalHTML, 'tonal')}
    ${miniCardHTML('Chromatic', '', chromHTML, 'chromatic')}
  </div>`;
}

function buildChordsCardHTML(blockId, key, drill, chromatic) {
  const keySpan  = `<span class="key-ref-${blockId}">${key}</span>`;
  const tonalHTML = `
    <div class="chord-tonal-drill" style="font-family:var(--font-display);font-size:36px;font-weight:900;color:var(--light-gold);line-height:1;">${drill.label}</div>
    <div class="chord-tonal-notation" style="font-size:12px;color:rgba(245,240,232,0.45);margin-top:6px;letter-spacing:1px;">${drill.notation}</div>`;
  const chromHTML = `
    <div class="chord-chrom-type" style="font-family:var(--font-display);font-size:40px;font-weight:900;color:var(--light-gold);line-height:1;">${chromatic.short}</div>
    <div class="chord-chrom-label" style="font-size:15px;color:var(--paper);margin-top:6px;">${chromatic.label}</div>`;
  return `<div class="block-body">
    ${miniCardHTML('Tonal · ' + keySpan, null, tonalHTML, 'tonal')}
    ${miniCardHTML('Chromatic', null, chromHTML, 'chromatic')}
  </div>`;
}

function toggleBlock(id) {
  doneTasks[id] = !doneTasks[id];
  const el  = document.getElementById('block-' + id);
  const chk = el.querySelector('.block-check');
  el.classList.toggle('done', doneTasks[id]);
  chk.textContent = doneTasks[id] ? '✓' : '';

  if (doneTasks[id]) {
    stopBlockTimer(id);
    playGong();
    const idx = currentSession.findIndex(b => b.id === id);
    if (idx >= 0 && idx < currentSession.length - 1) {
      const next = currentSession[idx + 1];
      if (!doneTasks[next.id]) startBlockTimer(next.id, next.mins);
    }
  } else {
    stopBlockTimer(id);
  }

  const done  = Object.values(doneTasks).filter(Boolean).length;
  const total = currentSession.length;
  const pt = document.getElementById('progressText');
  const pb = document.getElementById('progressBar');
  if (pt) pt.textContent = done + ' / ' + total;
  if (pb) pb.style.width = (done / total * 100) + '%';
}

function startBlockTimer(id, totalMins) {
  stopBlockTimer(id);
  const totalSecs = totalMins * 60;
  let elapsed = 0;
  const timerEl = document.getElementById('timer-' + id);
  const barEl   = document.getElementById('timerbar-' + id);
  const lblEl   = document.getElementById('timerlabel-' + id);
  const blockEl = document.getElementById('block-' + id);
  if (!timerEl) return;
  timerEl.classList.add('running');
  if (blockEl) blockEl.classList.add('active-timer');

  blockTimers[id] = setInterval(() => {
    elapsed++;
    const rem = totalSecs - elapsed;
    if (barEl) barEl.style.width = Math.max(0, rem / totalSecs * 100) + '%';
    if (lblEl) lblEl.textContent = '⏱ ' + fmt(Math.max(0, rem));
    if (rem <= 0) {
      stopBlockTimer(id);
      if (lblEl) lblEl.textContent = '✅ Done';
      if (barEl) barEl.style.width = '0%';
      if (blockEl) blockEl.classList.remove('active-timer');
      playGong();
    }
  }, 1000);
}

function stopBlockTimer(id) {
  if (blockTimers[id]) { clearInterval(blockTimers[id]); delete blockTimers[id]; }
  const timerEl = document.getElementById('timer-' + id);
  const blockEl = document.getElementById('block-' + id);
  if (timerEl) timerEl.classList.remove('running');
  if (blockEl) blockEl.classList.remove('active-timer');
}

// ── SAVE ──────────────────────────────────────────────
function saveDay() {
  if (!currentSession) return;
  const today = new Date().toLocaleDateString('en-US');
  const done  = Object.values(doneTasks).filter(Boolean).length;
  const sb    = currentSession.find(b => b.type === 'scales');
  const scaleStr = sb && sb._scale ? sb._scale.root + ' ' + sb._scale.type : '';

  history.unshift({ date: today, done, total: currentSession.length, scale: scaleStr, mins: sessionMins });

  let streak = 1;
  try {
    const s = JSON.parse(localStorage.getItem('sax_v1') || '{}');
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
    if (s.lastDate === yesterday.toLocaleDateString('en-US')) streak = (s.streak || 0) + 1;
    else if (s.lastDate === today) streak = s.streak || 1;
    localStorage.setItem('sax_v1', JSON.stringify({ history, streak, lastDate: today, sessionMins }));
  } catch(e) {}

  document.getElementById('streakCount').textContent = streak;
  renderHistory();
  showToast('💾 Session saved!');
}

// ── HISTORY ───────────────────────────────────────────
function renderHistory() {
  const el = document.getElementById('historyList');
  if (!history.length) return;
  el.innerHTML = history.slice(0, 12).map(h => `
    <div class="history-item">
      <div>
        <div class="history-main">${h.date} · ${h.mins || '?'} min</div>
        <div class="history-sub">${h.scale ? '🎼 ' + h.scale : ''}</div>
      </div>
      <div class="history-score">${h.done}/${h.total} ✅</div>
    </div>`).join('');
}

// ── METRONOME ─────────────────────────────────────────
let metroBpm   = 80;
let metroRunning = false;
let metroTimer = null;
let tapTimes   = [];

function setMetroBpm(bpm) {
  metroBpm = Math.min(200, Math.max(40, bpm));
  document.getElementById('metroBpm').textContent = metroBpm;
  document.getElementById('bpmSlider').value = metroBpm;
  if (metroRunning) { stopMetro(); startMetro(); }
}

function playWoodblock() {
  try {
    const ctx = getAudio();
    const t   = ctx.currentTime;
    // Woodblock: short noise burst filtered to mid-wood freq
    const bufSize = ctx.sampleRate * 0.04;
    const buf  = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);

    const src    = ctx.createBufferSource();
    src.buffer   = buf;

    const bpf    = ctx.createBiquadFilter();
    bpf.type     = 'bandpass';
    bpf.frequency.value = 800;
    bpf.Q.value  = 2.5;

    const gain   = ctx.createGain();
    gain.gain.setValueAtTime(0.55, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);

    src.connect(bpf); bpf.connect(gain); gain.connect(ctx.destination);
    src.start(t); src.stop(t + 0.08);
  } catch(e) {}
}

function startMetro() {
  if (metroRunning) return;
  metroRunning = true;
  document.getElementById('metroStart').textContent = '▶ Playing';
  playWoodblock();
  metroTimer = setInterval(playWoodblock, (60 / metroBpm) * 1000);
}

function stopMetro() {
  clearInterval(metroTimer);
  metroRunning = false;
  document.getElementById('metroStart').textContent = '▶ Start';
}

function tapTempo() {
  const now = Date.now();
  tapTimes.push(now);
  if (tapTimes.length > 8) tapTimes.shift();
  if (tapTimes.length > 1) {
    const gaps = [];
    for (let i = 1; i < tapTimes.length; i++) gaps.push(tapTimes[i] - tapTimes[i-1]);
    const avg = gaps.reduce((a,b) => a+b,0) / gaps.length;
    setMetroBpm(Math.round(60000 / avg));
  }
  clearTimeout(tapTimes._reset);
  tapTimes._reset = setTimeout(() => { tapTimes = []; }, 2000);
}

function bindMetronomeEvents() {
  document.getElementById('metroStart').addEventListener('click', () => { getAudio(); startMetro(); });
  document.getElementById('metroStop').addEventListener('click', stopMetro);
  document.getElementById('metroTap').addEventListener('click', () => { getAudio(); tapTempo(); });
  document.getElementById('bpmUp').addEventListener('click', () => setMetroBpm(metroBpm + 1));
  document.getElementById('bpmDown').addEventListener('click', () => setMetroBpm(metroBpm - 1));
  document.getElementById('bpmSlider').addEventListener('input', function() { setMetroBpm(parseInt(this.value)); });
}

// ── TOAST ─────────────────────────────────────────────
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

init();
</script>
